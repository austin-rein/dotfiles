# Color settings
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*:RGB"

# Enable mouse and keyboard
set -g mouse on
set -g set-clipboard on

# Rebind prefix
unbind C-b
set -g prefix C-t
bind C-t send-prefix

# Rebind splitting
unbind %
unbind '"'
unbind h
unbind v
bind H split-window -h
bind V split-window -v

# Vim keys for pane navigation
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# dwm style pane resizing
bind -n M-H resize-pane -L 1
bind -n M-J resize-pane -D 1
bind -n M-K resize-pane -U 1
bind -n M-L resize-pane -R 1

# Status bar
set -g status-style "bg=default,fg=white"
set -g status-position top 
set -g status-left-length 40
set -g status-left "#[fg=green,bold][#S] #[default]"
set -g status-right-length 50
set -g status-right "#[fg=white]%Y-%m-%d  %H:%M "
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[bg=green,fg=black,bold] #I:#W #[default]"
set -g status-interval 1

# Neovim optimizations
set -s escape-time 10
set -g focus-events on

# Start windows at 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Rebind window switch to numbers
bind -n M-! select-window -t 1
bind -n M-@ select-window -t 2
bind -n M-# select-window -t 3
bind -n M-$ select-window -t 4
bind -n M-% select-window -t 5
bind -n M-^ select-window -t 6
bind -n M-& select-window -t 7
bind -n M-* select-window -t 8
bind -n M-( select-window -t 9

bind B display-popup -E -w 60% -h 60% btop
bind G display-popup -E -d "#{pane_current_path}" -w 80% -h 80% gitui
bind R source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded"
